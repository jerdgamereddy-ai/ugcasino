<!DOCTYPE html><html><head>
        <title>GREYHOUND RACING - UG Casino</title>
        <link rel="stylesheet" href="css/reset.css" type="text/css">
        <link rel="stylesheet" href="css/main.css" type="text/css">
        <link rel="stylesheet" href="css/orientation_utils.css" type="text/css">
        <link rel="stylesheet" href="css/ios_fullscreen.css" type="text/css">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, minimal-ui">
        <meta name="msapplication-tap-highlight" content="no">
        <script type="text/javascript" src="js/jquery-3.1.1.min.js"></script>
        <script type="text/javascript" src="js/createjs.min.js"></script>
        <script type="text/javascript" src="js/howler.min.js"></script>
        <script type="text/javascript" src="js/screenfull.min.js"></script>
        <script type="text/javascript" src="js/greyhound_info.min.js"></script>
        <script type="text/javascript" src="js/CLang.min.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </head>
    <body ondragstart="return false;" ondrop="return false;">
        <canvas id="canvas" width="1024" height="768" style="position:fixed;"></canvas>
        <div style="position: fixed; background-color: transparent; top: 0px; left: 0px; width: 100%; height: 100%"></div>
        <script>
            var _parentBalance = null;
            var _gameInitialized = false;
            var _winOccurrence = 30;

            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'init_balance' && !_gameInitialized) {
                    _parentBalance = event.data.balance;
                    if (typeof event.data.winOccurrence === 'number') {
                        _winOccurrence = event.data.winOccurrence;
                    }
                    if (document.readyState === 'complete' || document.readyState === 'interactive') {
                        initGame();
                    }
                }
            });

            function sendToParent(type, data) {
                if (window.parent !== window) {
                    window.parent.postMessage({ type: type, ...(data || {}) }, '*');
                }
            }

            function initGame() {
                if (_gameInitialized || _parentBalance === null) return;
                _gameInitialized = true;

                var oMain = new CMain({
                    money: _parentBalance,
                    min_bet: 500,
                    max_bet: 500000,
                    win_occurrence: _winOccurrence,
                    game_cash: 10000000,
                    chip_values: [500, 1000, 2000, 5000, 10000, 20000],
                    show_credits: false,
                    fullscreen: true,
                    audio_enable_on_startup: true,
                    check_orientation: true,
                    num_levels_for_ads: 9999
                });

                $(oMain).on("recharge", function(evt) {});
                $(oMain).on("start_session", function(evt) {});
                $(oMain).on("end_session", function(evt) {
                    sendToParent('game_exit', {});
                });
                $(oMain).on("bet_placed", function(evt, iTotBet) {
                    sendToParent('bet_placed', { bet: iTotBet, tot_bet: iTotBet });
                });
                $(oMain).on("save_score", function(evt, iScore) {
                    sendToParent('save_score', { money: iScore });
                });
                $(oMain).on("show_interlevel_ad", function(evt) {});
                $(oMain).on("share_event", function(evt, iScore) {});
            }

            $(document).ready(function() {
                sendToParent('game_ready', {});
                if (_parentBalance !== null && !_gameInitialized) {
                    initGame();
                }
            });
        </script>
    </body>
</html>
