<script type="text/javascript">
var _parentBalance = 0;
var _gameReady = false;
var _pendingBalance = null;
var COINS_PER_UGX = 500;

function sendToParent(type, data) {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage(Object.assign({ type: type }, data), '*');
    }
}

window.addEventListener('message', function(event) {
    if (!event.data) return;
    if (event.data.type === 'init_balance') {
        _parentBalance = event.data.balance || 0;
        var coins = Math.floor(_parentBalance / COINS_PER_UGX);
        if (_gameReady) {
            setPlayerCoins(coins);
        } else {
            _pendingBalance = coins;
        }
    }
});

function setPlayerCoins(coins) {
    var ns = Q && Q.use ? Q.use('fish') : null;
    if (ns && ns.game && ns.game.player) {
        ns.game.player.updateCoin(coins, false);
    }
}

function patchPlayer() {
    var ns = Q.use('fish');
    if (!ns || !ns.game || !ns.game.player) {
        setTimeout(patchPlayer, 200);
        return;
    }
    var player = ns.game.player;
    var origFire = player.fire.bind(player);
    var origCapture = player.captureFish.bind(player);

    player.fire = function(targetPoint) {
        var power = this.cannon ? this.cannon.power : 1;
        var betAmount = power * COINS_PER_UGX;
        if (this.coin < power) return;
        sendToParent('bet', { amount: betAmount });
        origFire(targetPoint);
    };

    player.captureFish = function(fish) {
        var winAmount = (fish.coin || 0) * COINS_PER_UGX;
        sendToParent('win', { amount: winAmount });
        origCapture(fish);
    };

    _gameReady = true;
    if (_pendingBalance !== null) {
        setPlayerCoins(_pendingBalance);
        _pendingBalance = null;
    }
    sendToParent('ready', {});
}

window.addEventListener('load', function() {
    setTimeout(patchPlayer, 800);
});
</script>
